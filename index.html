<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Albury Wodonga Avurudu Contributions</title>

<style>
:root {
  --red: #842032;
  --yellow: #F6BB00;
  --blue: #1E3A5F;
  --bg: #f6f4ef;
}

* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--blue);
}

/* HEADER */
.header {
  background: var(--red);
  color: white;
  padding: 20px;
  text-align: center;
}

.logo {
  width: 80px;
  height: 80px;
  margin: 0 auto 10px;
  border-radius: 50%;
  overflow: hidden;
  background: #ccc;
}

.logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.header h1 {
  margin: 0;
  font-size: 20px;
}

/* SECTION */
.section {
  padding: 15px;
  margin: 10px;
  background: white;
  border-radius: 12px;
}

.section h2 {
  margin: 0 0 10px;
  border-bottom: 2px solid var(--yellow);
  padding-bottom: 5px;
}

/* STATUS */
.status-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.card {
  background: var(--red);
  color: white;
  padding: 12px;
  border-radius: 10px;
  font-size: 14px;
}

.progress {
  height: 6px;
  background: #ddd;
  border-radius: 5px;
  margin-top: 6px;
}

.progress-bar {
  height: 100%;
  background: var(--yellow);
}

/* FORM */
form {
  display: grid;
  gap: 10px;
}

input, select {
  padding: 12px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: var(--yellow);
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
}

button:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}

.qty-wrap {
  display: flex;
  align-items: center;
  border: 1px solid #ccc;
  border-radius: 8px;
  overflow: hidden;
}

.qty-wrap input {
  flex: 1;
  border: none;
  border-radius: 0;
  padding: 12px;
  font-size: 16px;
  outline: none;
}

.qty-wrap .unit-label {
  padding: 0 14px;
  color: #555;
  font-size: 15px;
  white-space: nowrap;
  background: #f5f5f5;
  border-left: 1px solid #ccc;
  height: 100%;
  display: flex;
  align-items: center;
}

#status-msg {
  font-size: 14px;
  min-height: 18px;
  color: var(--blue);
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th {
  background: var(--blue);
  color: white;
  padding: 8px;
  text-align: left;
}

td {
  padding: 8px;
  border-bottom: 1px solid #eee;
}

/* RESPONSIVE */
@media (min-width: 600px) {
  .status-grid {
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  }

  .section {
    max-width: 700px;
    margin: 15px auto;
  }

  .header h1 {
    font-size: 24px;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="data:image/png;base64,REPLACE_THIS_BASE64">
  </div>
  <h1>Albury Wodonga අලුත් අවුරුදු 2026</h1>
</div>

<div class="section">
  <h2>Current Contributions</h2>
  <div class="status-grid" id="statusGrid"><em>Loading...</em></div>
</div>

<div class="section">
  <h2>Add Your Contribution</h2>
  <form id="form">
    <input id="name" placeholder="Full Name" required>
    <input id="contact" placeholder="Phone Number" required>

    <select id="item" required>
      <option value="">-- Select Item --</option>
      <option>කිරි බත්</option>
      <option>කට්ට සම්බෝල</option>
      <option>සීනි සම්බල්</option>
      <option>ලුණු මිරිස්</option>
    </select>

    <div class="qty-wrap">
      <input id="qty" type="number" min="1" placeholder="Quantity" required>
      <span class="unit-label" id="qty-unit">—</span>
    </div>
    <button type="submit" id="submitBtn">Submit</button>
    <div id="status-msg"></div>
  </form>
</div>

<div class="section">
  <h2>Contributors</h2>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Item</th>
        <th>Quantity</th>
      </tr>
    </thead>
    <tbody id="contributors"></tbody>
  </table>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyWVDNNqrE_GRaMMFxWHr6t0zAt6ulckRiluTfi3c1HAjMzuSdnAmn39hYJePT8p-na/exec";

const config = {
  "කිරි බත්":     { required: 100, unit: "කැට" },
  "කට්ට සම්බෝල": { required: 5,   unit: "පිඟං" },
  "සීනි සම්බල්":  { required: 5,   unit: "පිඟං" },
  "ලුණු මිරිස්":  { required: 5,   unit: "පිඟං" }
};

let data = [];

// JSONP — bypasses CORS entirely; works with Google Apps Script redirects
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const id = "_cb" + Date.now();
    const script = document.createElement("script");
    window[id] = (d) => { delete window[id]; script.remove(); resolve(d); };
    script.onerror = () => { delete window[id]; script.remove(); reject(new Error("Network error")); };
    script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + id + "&t=" + Date.now();
    document.head.appendChild(script);
  });
}

// READ
async function load() {
  try {
    const json = await jsonp(API_URL);
    data = Array.isArray(json) ? json : [];
  } catch (err) {
    console.error("Load error:", err);
    data = [];
  }
  render();
}

// RENDER
function render() {
  const totals = {};
  Object.keys(config).forEach(k => totals[k] = 0);
  data.forEach(r => {
    if (totals[r.item] !== undefined) totals[r.item] += Number(r.qty) || 0;
  });

  // Status cards
  const grid = document.getElementById("statusGrid");
  grid.innerHTML = "";
  Object.keys(config).forEach(item => {
    const t = totals[item];
    const req = config[item].required;
    const unit = config[item].unit;
    const remaining = Math.max(req - t, 0);
    const pct = Math.min((t / req) * 100, 100).toFixed(0);
    grid.innerHTML += `
      <div class="card">
        <strong>${item}</strong><br>
        Collected: ${t} / ${req} ${unit}<br>
        <small>Remaining: ${remaining} ${unit}</small>
        <div class="progress">
          <div class="progress-bar" style="width:${pct}%"></div>
        </div>
      </div>`;
  });

  // Contributors table
  const tbody = document.getElementById("contributors");
  tbody.innerHTML = data.length === 0
    ? '<tr><td colspan="3" style="text-align:center;color:#999">No contributions yet</td></tr>'
    : data.map(r => `<tr><td>${r.name}</td><td>${r.item}</td><td>${r.qty}</td></tr>`).join("");
}

// SUBMIT
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const btn    = document.getElementById("submitBtn");
  const status = document.getElementById("status-msg");
  const nameVal    = document.getElementById("name").value.trim();
  const contactVal = document.getElementById("contact").value.trim();
  const itemVal    = document.getElementById("item").value;
  const qtyVal     = document.getElementById("qty").value;

  btn.disabled = true;
  btn.textContent = "Submitting...";
  status.textContent = "";

  try {
    const url = `${API_URL}?name=${encodeURIComponent(nameVal)}&contact=${encodeURIComponent(contactVal)}&item=${encodeURIComponent(itemVal)}&qty=${encodeURIComponent(qtyVal)}`;
    const res = await jsonp(url);
    if (res && res.status === "ok") {
      // Give the sheet a moment to commit before reloading
      await new Promise(r => setTimeout(r, 1000));
      await load();
      e.target.reset();
      document.getElementById("qty-unit").textContent = "—";
      status.textContent = "Contribution added successfully!";
      setTimeout(() => { status.textContent = ""; }, 3000);
    } else {
      status.textContent = "Something went wrong. Please try again.";
    }
  } catch (err) {
    console.error("Submit error:", err);
    status.textContent = "Network error. Please try again.";
  }

  btn.textContent = "Submit";
  btn.disabled = false;
});

// Update unit label when item is selected
document.getElementById("item").addEventListener("change", function () {
  const unit = config[this.value] ? config[this.value].unit : "—";
  document.getElementById("qty-unit").textContent = unit;
});

// INIT
load();
</script>

</body>
</html>
